# =====================================================================
#  Heyavatar Model Registry
# =====================================================================
#  Each entry below must stay in sync with the manifest.yaml that lives
#  next to every provider adapter. The registry is the source of truth
#  for license, weight provenance, and commercial-use eligibility.
#
#  Field semantics:
#    model_id        — stable identifier referenced by manifests and contracts
#    provider        — provider folder under providers/ (e.g. liveportrait)
#    code_license    — license of the upstream code (we inherit via adapter)
#    weights_license — license of the model weights/checkpoints
#    commercial_use  — whether the combined stack may be used commercially
#    dependencies    — auxiliary libraries the adapter needs at runtime
#    checkpoint_url  — canonical download location (pinned)
#    checkpoint_sha256 — content hash for verification
#    notes           — free-form text surfaced at install/validation time
# =====================================================================

models:

  - model_id: liveportrait-human-v1
    provider: liveportrait
    code_license: MIT
    weights_license: MIT
    commercial_use: false   # GATED — see note below
    dependencies:
      face_detector:
        provider: mediapipe
        license: Apache-2.0
      landmark_model:
        provider: mediapipe-face-landmarker
        license: Apache-2.0
      audio_bridge:
        provider: sadtalker
        code_license: Apache-2.0
        weights_license: NON-COMMERCIAL    # trained on LRW + VoxCeleb
      audio_bridge_backend_default: dsp    # CI default; operator flips to `neural` on GPU worker
    checkpoint_url: https://github.com/KlingAIResearch/LivePortrait/releases
    checkpoint_sha256: TBD
    notes: >-
      InsightFace replaced by MediaPipe Face Landmarker (identity
      preparation now uses mp.solutions.face_mesh + OpenCV Haar
      fallback). The audio-to-expression bridge is now SadTalker
      Audio2Motion (3DMM 50+3 → LivePortrait 21×3 via the static
      projector in `providers/liveportrait/audio_bridge/projection.py`)
      under HEYAVATAR_AUDIO_BRIDGE_BACKEND=neural, with the legacy
      DSP envelope pathway retained for CI mock-mode via
      HEYAVATAR_AUDIO_BRIDGE_BACKEND=dsp. The `commercial_use` flag
      IS still `false` because BOTH:
      (a) SadTalker's audio2motion checkpoint weights are trained on
          LRW + VoxCeleb (both non-commercial research corpora), AND
      (b) the release gates
          `tests/smoke/test_real_gpu/test_mediapipe_identity.py`
          AND `tests/smoke/test_real_gpu/test_pipeline.py` (SSD-based
          mouth-sync assertion) both need to pass on the production
          GPU box before flipping — only the latter is runnable when
          SadTalker is wired through.
      DO NOT flip to `true` until both gates pass AND the audio
      bridge ships with commercially-licensed weights (i.e. if the
      production audio bridge is not SadTalker).

  - model_id: musetalk-v1
    provider: musetalk
    code_license: MIT
    weights_license: MIT
    commercial_use: true
    dependencies:
      vae:
        provider: stability-ai
        license: OpenRAIL
      whisper:
        provider: openai
        license: MIT
      face_detector:
        provider: mediapipe
        license: Apache-2.0
    checkpoint_url: https://github.com/TMElyralab/MuseTalk/releases
    checkpoint_sha256: TBD
    notes: >-
      MuseTalk is the recommended real-time engine. Verify compatibility of
      the VAE and Whisper versions at install time.

  - model_id: echomimic-v1
    provider: echomimic
    code_license: Apache-2.0
    weights_license: Apache-2.0
    commercial_use: true
    dependencies:
      audio_encoder:
        provider: echo-mimic-team
        license: Apache-2.0
    checkpoint_url: https://github.com/BadToBest/EchoMimic/releases
    checkpoint_sha256: TBD
    notes: >-
      Use EchoMimic for "landmark-control" rendering pipelines.

# =====================================================================
#  Default tier routing (informational; the live router lives in
#  src/scheduler/router.py and reads from this file).
# =====================================================================

tiers:
  express:
    engine: musetalk-v1
    fallbacks:
      - liveportrait-human-v1
    rationale: Real-time-ish, MIT-licensed, low VRAM; degrades to LivePortrait
      if all musetalk workers are busy or VRAM-bounded.
  studio:
    engine: liveportrait-human-v1
    fallbacks:
      - musetalk-v1
      - echomimic-v1
    rationale: Half-body with stitched expressions; prep required for
      commercial use. Higher quality backstops when LivePortrait is busy.
  premium:
    engine: echomimic-v1
    fallbacks: []
    rationale: Generative, full-anchor control, highest VRAM. No fallback
      by design — premium work is queued and shed rather than silently
      downgraded to a lower tier.
