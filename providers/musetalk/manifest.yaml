# MuseTalk provider manifest — kept in sync with `registry/models.yaml`.
api_version: "engine.contract/v1"

engine_id: musetalk-v1
display_name: MuseTalk (latent-space real-time lip-sync)

license:
  code: MIT
  weights: MIT
  commercial_use: true

runtime:
  python: ">=3.10"
  cuda: ">=11.8,<13"
  pytorch: ">=2.0,<2.5"
  vram_min_mb: 4096
  cpu_friendly: false

input:
  source_image_required: true
  audio_required: true

output:
  container: mp4
  codec: h264
  resolution_policy: match_identity

supports_mock: true
mock_env_var: HEYAVATAR_MOCK_ENGINE

knobs:
  - key: bbox_shift
    type: float
    default: 0
    description: Crop offset applied to the detected face bounding box.
  - key: extra_margin
    type: float
    default: 10
    description: Pixel padding added to the face crop before VAE encoding.
