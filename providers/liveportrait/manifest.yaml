# LivePortrait provider manifest — kept in sync with `registry/models.yaml`.
api_version: "engine.contract/v1"

engine_id: liveportrait-human-v1
display_name: LivePortrait (keypoint-based portrait animator)

license:
  code: MIT
  weights: MIT
  commercial_use: false   # see InsightFace detector in registry/models.yaml

runtime:
  python: ">=3.10"
  cuda: ">=11.8,<13"
  pytorch: ">=2.0,<2.5"
  vram_min_mb: 6144
  cpu_friendly: false

# Inputs/outputs as the AvatarEngine contract sees them
input:
  source_image_required: true
  audio_required: true
  preview_video_required: false

output:
  container: mp4
  codec: h264
  resolution_policy: match_identity

# Mock engine support
supports_mock: true
mock_env_var: HEYAVATAR_MOCK_ENGINE

# Adapter-specific configuration knobs
knobs:
  - key: relative_motion
    type: float
    default: 1.0
    description: Scale of head/expression motion vs the source.
  - key: paste_back
    type: boolean
    default: true
    description: Composite rendered face back onto the source background.

# Upstream release tracking — keep `version` in sync with the GitHub
# release pinned by `checkpoint_manager.py` and bump `release_url`
# after every upstream release you adopt.
upstream_release:
  version: v1.0
  release_url: https://github.com/KlingAIResearch/LivePortrait/releases/tag/v1.0
  pip_source_repo: https://github.com/KlingAIResearch/LivePortrait
  contract_version: liveportrait-v1

# Checkpoint expectations — see `providers/liveportrait/checkpoint_manager.py`
# for the authoritative list and the SHA pin placeholders.
checkpoint_files:
  - appearance_feature_extractor.safetensors
  - motion_extractor.safetensors
  - warping_module.safetensors
  - stitching_retargeting_module.safetensors
  - spade_generator.safetensors

# Conditional commercial use depending on third-party detector
# replacement. See docs/MODEL_LICENSES.md § Replacing InsightFace.
commercial_clearance:
  requires:
    - mediapipe-face-landmarker installed and used at runtime
    - sha256 pins populated in providers/liveportrait/checkpoint_manager.py
  clears_after: docs/MODEL_LICENSES.md §LivePortrait obligations
